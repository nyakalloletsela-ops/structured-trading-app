<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Structured Terminal</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [step, setStep] = useState(1);
            const [pips, setPips] = useState(10);
            const [dailyProfit, setDailyProfit] = useState(0);
            const [checklist, setChecklist] = useState({
                htfBias: false, h4Levels: false, priceAtOB: false, ltfConfirm: false, confluence30m: false
            });

            const getLotSize = (p) => {
                if (p === 10) return "0.2 - 0.3 Lot";
                if (p > 10 && p <= 15) return "0.1 Lot";
                return "INVALID RISK";
            };

            const allChecked = Object.values(checklist).every(Boolean);

            return (
                <div className="min-h-screen text-slate-100 p-4 max-w-md mx-auto">
                    {/* Header */}
                    <div className="flex justify-between items-center mb-6 border-b border-slate-800 pb-4 mt-4">
                        <div>
                            <h1 className="text-xl font-bold tracking-tight">STRUCTURED</h1>
                            <p className="text-slate-500 text-xs uppercase tracking-widest">GOLD | US500</p>
                        </div>
                        <div className="text-right">
                            <p className="text-[10px] text-slate-500 uppercase">Goal: $10</p>
                            <span className="mono text-emerald-400 font-bold">${dailyProfit}</span>
                        </div>
                    </div>

                    {/* Risk Tool */}
                    <div className="bg-slate-900/50 border border-slate-800 p-4 rounded-2xl mb-6">
                        <div className="flex justify-between items-center mb-2">
                            <label className="text-xs text-slate-400 uppercase">Stop Loss Pips</label>
                            <span className="mono text-blue-400 font-bold">{getLotSize(pips)}</span>
                        </div>
                        <input 
                            type="range" min="8" max="20" value={pips} 
                            onChange={(e) => setPips(parseInt(e.target.value))}
                            className="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-blue-500"
                        />
                        <div className="flex justify-between mt-2 text-[10px] text-slate-600">
                            <span>8 Pips</span><span>10 (High Lot)</span><span>15 (0.1 Lot)</span><span>20</span>
                        </div>
                    </div>

                    {/* Checklist */}
                    <div className="space-y-3">
                        {Object.entries({
                            htfBias: 'HTF Bias (W/D) Clear',
                            h4Levels: 'H4 Levels (BOS/FVG/OB)',
                            priceAtOB: 'Price at H4/HTF OB',
                            ltfConfirm: 'LTF BOS + CHoCH',
                            confluence30m: '30m Confluence Present'
                        }).map(([id, label]) => (
                            <div 
                                key={id}
                                onClick={() => setChecklist({...checklist, [id]: !checklist[id]})}
                                className={`flex items-center justify-between p-4 rounded-xl border transition-all ${
                                    checklist[id] ? 'bg-emerald-500/10 border-emerald-500/50' : 'bg-slate-900 border-slate-800'
                                }`}
                            >
                                <span className={`text-sm ${checklist[id] ? 'text-emerald-400' : 'text-slate-400'}`}>{label}</span>
                                <div className={`w-5 h-5 rounded-md border flex items-center justify-center ${checklist[id] ? 'bg-emerald-500 border-emerald-500' : 'border-slate-700'}`}>
                                    {checklist[id] && <i className="lucide-check text-white w-3 h-3"></i>}
                                </div>
                            </div>
                        ))}
                    </div>

                    <button
                        disabled={!allChecked}
                        onClick={() => setStep(4)}
                        className={`w-full mt-8 py-4 rounded-2xl font-bold text-lg transition-all ${
                            allChecked ? 'bg-emerald-500 text-slate-950 shadow-lg shadow-emerald-500/20' : 'bg-slate-800 text-slate-600'
                        }`}
                    >
                        {allChecked ? 'EXECUTE TRADE' : 'FINISH CHECKLIST'}
                    </button>

                    {/* Active Trade Overlay */}
                    {step === 4 && (
                        <div className="fixed inset-0 bg-slate-950 flex items-center justify-center z-50 p-6">
                            <div className="w-full text-center">
                                <div className="w-20 h-20 bg-blue-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <div className="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                                </div>
                                <h2 className="text-2xl font-bold mb-2 uppercase italic">Position Live</h2>
                                <p className="mono text-slate-500 mb-12">{getLotSize(pips)} @ {pips} Pips SL</p>
                                
                                <div className="space-y-4">
                                    <button 
                                        onClick={() => { setDailyProfit(d => d + 10); setStep(1); setChecklist({htfBias:false, h4Levels:false, priceAtOB:false, ltfConfirm:false, confluence30m:false}) }}
                                        className="w-full bg-emerald-500 text-slate-950 font-black py-5 rounded-2xl text-xl"
                                    >
                                        HIT TAKE PROFIT
                                    </button>
                                    <button 
                                        onClick={() => { setStep(1); setChecklist({htfBias:false, h4Levels:false, priceAtOB:false, ltfConfirm:false, confluence30m:false}) }}
                                        className="w-full bg-red-600 text-white font-bold py-4 rounded-2xl"
                                    >
                                        HIT STOP LOSS
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
